[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

# Serve assetlinks.json via a function so the hidden .well-known folder
# doesn't need to be committed to the repo
[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/.netlify/functions/assetlinks"
  status = 200
