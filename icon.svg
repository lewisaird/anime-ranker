<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#161b22"/>

  <!-- Subtle 決 (decisive battle) watermark behind the swords -->
  <text x="256" y="322" text-anchor="middle"
        font-family="'Hiragino Mincho Pro','Yu Mincho','MS Mincho',serif"
        font-size="260" font-weight="900" fill="#58a6ff" opacity="0.07">決</text>

  <!-- Sword 1: blue katana — tip NW, handle SE -->
  <g transform="translate(256,256) rotate(45)">
    <!-- Blade (tapered from guard to tip) -->
    <polygon points="-210,0 0,-12 0,12" fill="#58a6ff"/>
    <!-- Blade spine highlight -->
    <line x1="-210" y1="0" x2="0" y2="-12"
          stroke="#a5c8ff" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
    <!-- Guard (tsuba) -->
    <ellipse cx="0" cy="0" rx="10" ry="24" fill="#388bfd"/>
    <!-- Handle body -->
    <rect x="10" y="-9" width="118" height="18" rx="6" fill="#1c2128"/>
    <!-- Handle wrapping (ito) -->
    <rect x="22" y="-9" width="8" height="18" rx="2" fill="#2d333b"/>
    <rect x="42" y="-9" width="8" height="18" rx="2" fill="#2d333b"/>
    <rect x="62" y="-9" width="8" height="18" rx="2" fill="#2d333b"/>
    <rect x="82" y="-9" width="8" height="18" rx="2" fill="#2d333b"/>
    <rect x="102" y="-9" width="8" height="18" rx="2" fill="#2d333b"/>
    <!-- Pommel (kashira) -->
    <ellipse cx="140" cy="0" rx="13" ry="11" fill="#388bfd"/>
  </g>

  <!-- Sword 2: silver katana — tip NE, handle SW -->
  <g transform="translate(256,256) rotate(135)">
    <!-- Blade -->
    <polygon points="-210,0 0,-12 0,12" fill="#c9d1d9"/>
    <!-- Blade spine highlight -->
    <line x1="-210" y1="0" x2="0" y2="-12"
          stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <!-- Guard -->
    <ellipse cx="0" cy="0" rx="10" ry="24" fill="#8b949e"/>
    <!-- Handle body -->
    <rect x="10" y="-9" width="118" height="18" rx="6" fill="#21262d"/>
    <!-- Handle wrapping -->
    <rect x="22" y="-9" width="8" height="18" rx="2" fill="#30363d"/>
    <rect x="42" y="-9" width="8" height="18" rx="2" fill="#30363d"/>
    <rect x="62" y="-9" width="8" height="18" rx="2" fill="#30363d"/>
    <rect x="82" y="-9" width="8" height="18" rx="2" fill="#30363d"/>
    <rect x="102" y="-9" width="8" height="18" rx="2" fill="#30363d"/>
    <!-- Pommel -->
    <ellipse cx="140" cy="0" rx="13" ry="11" fill="#8b949e"/>
  </g>

  <!-- Clash spark at the crossing point -->
  <circle cx="256" cy="256" r="9" fill="#f0c040"/>
  <circle cx="256" cy="256" r="20" fill="none" stroke="#f0c040" stroke-width="1.5" opacity="0.35"/>
  <!-- Cardinal spark rays -->
  <line x1="256" y1="256" x2="256" y2="224" stroke="#f0c040" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="256" y2="288" stroke="#f0c040" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="224" y2="256" stroke="#f0c040" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="288" y2="256" stroke="#f0c040" stroke-width="3" stroke-linecap="round"/>
  <!-- Diagonal spark rays -->
  <line x1="256" y1="256" x2="233" y2="233" stroke="#f0c040" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="256" x2="279" y2="279" stroke="#f0c040" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="256" x2="279" y2="233" stroke="#f0c040" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="256" x2="233" y2="279" stroke="#f0c040" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
