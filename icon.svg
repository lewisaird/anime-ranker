  <rect width="512" height="512" rx="96" fill="#161b22"/>

  <!-- 3rd place bar -->
  <rect x="88" y="280" width="88" height="160" rx="10" fill="#30363d"/>
  <!-- 1st place bar -->
  <rect x="212" y="160" width="88" height="280" rx="10" fill="#58a6ff"/>
  <!-- 2nd place bar -->
