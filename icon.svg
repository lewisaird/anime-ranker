  <text x="256" y="152" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif"
        font-size="40" font-weight="700" fill="#e6edf3">1</text>
  <text x="380" y="212" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif"
