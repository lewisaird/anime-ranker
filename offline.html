<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kessen — Offline</title>
  <meta name="theme-color" content="#161b22" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 320px; }
    .icon { font-size: 3rem; margin-bottom: 20px; }
    h1 { font-size: 1.3rem; font-weight: 700; color: #e6edf3; margin-bottom: 10px; }
    p  { font-size: 0.9rem; color: #8b949e; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #58a6ff;
      color: #0d1117;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #79b8ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">⚔️</div>
    <h1>You're offline</h1>
    <p>Kessen needs a connection to load your anime list and sync scores. Check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
